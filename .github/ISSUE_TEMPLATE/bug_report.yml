name: Bug report
description: Report a defect in EnvLint
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include commands, schema, and env content with secrets replaced.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: EnvLint version
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
    validations:
      required: true
